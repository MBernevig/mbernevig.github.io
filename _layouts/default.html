<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}" data-mode="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — Portfolio{% endif %}</title>
  <meta name="description" content="{{ page.description | default: page.blurb | default: site.description }}">

  <link rel="icon" href="{{ '/assets/img/favicons/favicon.svg' | relative_url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: page.blurb | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="{{ '/assets/css/portfolio.css' | relative_url }}">
</head>
<body>
  <header class="nav" id="top">
    <a class="nav__brand" href="{{ '/' | relative_url }}">
      <span class="nav__mark">MB</span>
      <span class="nav__name">Mihnea Bernevig</span>
    </a>
    <nav class="nav__links">
      <a href="{{ '/#about' | relative_url }}">About</a>
      <a href="{{ '/#work' | relative_url }}">Work</a>
      <a href="{{ '/#likes' | relative_url }}">Likes</a>
      <a href="{{ '/assets/files/mihnea_bernevig_cv.pdf' | relative_url }}">CV</a>
      <a href="{{ '/#contact' | relative_url }}">Contact</a>
    </nav>
  </header>

  {{ content }}

  <footer class="footer">
    <span>© {{ 'now' | date: '%Y' }} Mihnea Bernevig</span>
    <span class="footer__sep">·</span>
    <span>Hand-built with Jekyll, HTML, CSS &amp; a little JavaScript</span>
  </footer>

  <script defer src="{{ '/assets/js/space-bg.js' | relative_url }}"></script>
  <script defer src="{{ '/assets/js/portfolio.js' | relative_url }}"></script>
</body>
</html>
