# The Site Configuration

# The language of the webpage › http://www.lingoes.net/en/translator/langcode.htm
lang: en

# Change to your timezone › https://kevinnovak.github.io/Time-Zone-Picker
timezone: Europe/Amsterdam

title: Mihnea Bernevig # the main title

description: >- # used by SEO meta tags
  Portfolio of Mihnea Bernevig — Computer Scientist and game / graphics engineer.
  MSc Computer Science at TU Delft. Selected work in compilers, real-time graphics,
  and systems.

# Fill in the protocol & hostname for your site.
# E.g. 'https://username.github.io', note that it does not end with a '/'.
url: "https://mbernevig.github.io"

# The base URL of your site
baseurl: ""

# ------------ Markdown / syntax highlighting ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false

# ------------ Collections ------------------

# Each file in `_projects/` becomes a portfolio entry: a card on the home page
# plus its own detail page at `/projects/<filename>/`.
collections:
  projects:
    output: true
    sort_by: order
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - vendor
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
